<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="author" content="Handy Bites Café">
    <meta name="copyright" content="© 2025 Handy Bites Café. All rights reserved.">
    <title>Handy Bites Cafe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo-placeholder.png">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="header-logo">
                <img src="assets/HBLogo.png" alt="Handy Bites Logo" class="header-logo-img" />
            </div>
            <div class="title-logo-row">
                <h1 class="site-title">Handy Bites Café</h1>
            </div>
            <div class="slogan">
                <h2>Sips, Bites and Good times</h2>
            </div>
            <nav class="order-nav">
                <a href="https://link.zomato.com/xqzv/rshare?id=834581783056348b" target="_blank" class="order-btn zomato">
                    <img src="assets/zomato.svg" alt="Zomato" class="icon svg-icon" width="24" height="24" />
                    <span>Order now Zomato</span>
                </a>
                <a href="https://www.swiggy.com/direct/brand/562798?source=swiggy-direct&subSource=generic" target="_blank" class="order-btn swiggy">
                    <img src="assets/swiggy.svg" alt="Swiggy" class="icon svg-icon" width="24" height="24" />
                    <span>Order now Swiggy</span>
                </a>
            </nav>
        </header>
        <main>
            <p class="insta-text">Follow Us On Instagram</p>
            <a href="https://www.instagram.com/handybites.in?igsh=cG9pYTA0b21ibXpv" target="_blank" class="insta-link">
                <img src="assets/instagram.svg" alt="Instagram" class="icon svg-icon" width="24" height="24" />
                <span>@handybites.in</span>
            </a>
            <nav class="order-nav google-nav">
                <a href="https://share.google/IF0nR9hM9X5G4NKOo" target="_blank" class="order-btn google">
                    <img src="assets/google.svg" alt="Google" class="icon svg-icon" width="24" height="24" />
                    <span>Find us on Google</span>
                </a>
            </nav>
            <div class="slideshow-container">
                <div class="slideshow" id="slideshow">
                    <!-- Slides will be dynamically generated by JavaScript -->
                </div>
            </div>
        </main>
        <footer>
            <p>&copy; 2025 Handy Bites Café. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
    <script src="protection.js"></script>
</body>
</html>
