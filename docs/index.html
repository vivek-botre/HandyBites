<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handy Bites Cafe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo-placeholder.png">
</head>
<body>
    <header>
        <div class="logo">
            <!-- Logo Placeholder -->
            <img src="logo-placeholder.png" alt="Handy Bites Logo" />
        </div>
        <h1>Handy Bites Cafe</h1>
        <nav>
            <a href="https://link.zomato.com/xqzv/rshare?id=834581783056348b" target="_blank" class="order-btn zomato">
                <img src="assets/zomato.svg" alt="Zomato" class="icon svg-icon" width="28" height="28" /> Order on Zomato
            </a>
            <a href="https://www.swiggy.com/direct/brand/562798?source=swiggy-direct&subSource=generic" target="_blank" class="order-btn swiggy">
                <img src="assets/swiggy.svg" alt="Swiggy" class="icon svg-icon" width="28" height="28" /> Order on Swiggy

            <a href="https://share.google/IF0nR9hM9X5G4NKOo" target="_blank" class="order-btn google">

        </nav>
    </header>
    <main>
        <section class="instagram-section">
            <h2>Follow Us On Instagram</h2>
            <a href="https://www.instagram.com/handybites.in?igsh=cG9pYTA0b21ibXpv" target="_blank" class="insta-link">
                <img src="assets/instagram.svg" alt="Instagram" class="icon svg-icon" width="28" height="28" /> @handybites.in
            </a>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Handy Bites Cafe. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
